general {
    lock_cmd = omarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 4 minutes
listener {
    timeout = 240
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Lock after 5 min on battery (screensaver resets idle timer: 240+62=302s≈5min)
listener {
    timeout = 62
    on-timeout = sh -c '[ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null | head -1)" = "0" ] && omarchy-system-lock'
    on-resume = omarchy-system-wake
}

# Lock after 15 min on AC power (screensaver resets idle timer: 240+662=902s≈15min)
listener {
    timeout = 662
    on-timeout = sh -c '[ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null | head -1)" != "0" ] && omarchy-system-lock'
    on-resume = omarchy-system-wake
}

# Jay added this
listener {
    timeout = 1800                          # 30min
    on-timeout = systemctl suspend          # suspend after 30min idle
}
